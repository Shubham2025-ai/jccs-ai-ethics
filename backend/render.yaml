services:
  - type: web
    name: jccs-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: USE_SQLITE
        value: true
      - key: GROQ_API_KEY
        sync: false         # You paste this manually in Render dashboard
      - key: FRONTEND_URL
        sync: false         # You paste your Vercel URL here
      - key: DEBUG
        value: false
